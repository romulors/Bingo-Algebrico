<h2>Tópicos</h2>
<hr>
<p class="section-description">Selecione os tópicos que farão parte do bingo.</p>
<div class="table-container inline-form-panel">
    <div class="form-grid form-grid-topicos">
        <label>
            <span>Novo tópico</span>
            <input type="text" id="inputNovoTopicoNome" placeholder="Ex.: Álgebra básica" maxlength="60">
        </label>
    </div>
    <p class="helper-text">Use um nome curto e claro. O tópico ficará disponível imediatamente para seleção.</p>
</div>
<div class="topicsList" id="topicsList"></div>
<div class="actions-row">
    <button class="botao" id="botaoAdicionarNovoTopico" type="button">Adicionar novo Tópico</button>
    <button class="botao" id="botaoSalvarTopicos" type="button">Salvar Tópicos</button>
    <button class="botao botao-nav-next" data-next="equacoes" type="button">Continuar para Equações <i class="fas fa-arrow-right"></i></button>
</div>
