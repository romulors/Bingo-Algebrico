<!-- TopicCard — template reference (not loaded at runtime) -->
<!-- Used by: src/components/telaTopicos/telaTopicos.js via createTopicCard() -->
<article class="topicCard [selected]">
    <span class="topicName">Nome do Tópico</span>
    <span class="topicNumberOfQuestions">N Equações</span>
    <div class="topicFooter">
        <span class="icon-btn success editTopicButton" title="Editar tópico"><i class="fas fa-wrench"></i></span>
        <span class="topicStatus">Adicionado | Não adicionado</span>
        <span class="icon-btn danger deleteTopicButton" title="Remover tópico"><i class="fas fa-xmark"></i></span>
    </div>
</article>
