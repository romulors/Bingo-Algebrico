<!-- PresetCard — template reference (not loaded at runtime) -->
<!-- Used by: src/components/telaPresets/telaPresets.js via createPresetCard() -->
<article class="presetCard [selected]">
    <div class="presetIcon"><i class="fas fa-icon-name"></i></div>
    <span class="presetTitle">Título do Preset</span>
    <p class="presetDescription">Descrição do preset.</p>
    <div class="presetFooter">
        <div class="presetTags">
            <span class="badge">Tópico 1</span>
        </div>
        <span class="presetAction">Aplicar | Selecionar <i class="fas fa-arrow-right"></i></span>
    </div>
</article>
