<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Bingo Algébrico</title>
        <link rel="stylesheet" type="text/css" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css" integrity="sha512-SzlrxWUlpfuzQ+pcUCosxcglQRNAq/DZjVsC0lE40xsADsfeQoEypE+enwcOiGjk/bSuGGKHEyjSoQ1zVisanQ==" crossorigin="anonymous" referrerpolicy="no-referrer">
    </head>
    <body>
        <!-- O conteúdo do nav é carregado via fetch por nav-menu.js -->
        <nav id="nav-menu"></nav>

        <div id="appMessage" role="status" aria-live="polite" style="display:none;">
            <span id="appMessageText"></span>
            <button id="appMessageAction" type="button" style="margin-left:8px;"></button>
        </div>

        <div id="page">
            <main>
                <!-- Cada section é preenchida via fetch pelo respectivo componente -->
                <section class="page-content inicio active"   data-screen="inicio"></section>
                <section class="page-content presets"         data-screen="presets"></section>
                <section class="page-content topicos"         data-screen="topicos"></section>
                <section class="page-content equacoes"        data-screen="equacoes"></section>
                <section class="page-content restricoes"      data-screen="restricoes"></section>               
                <section class="page-content questoes"        data-screen="questoes"></section>
                <section class="page-content bingo"           data-screen="bingo"></section>
                <section class="page-content visual"           data-screen="visual"></section>
                <section class="page-content cartelas"        data-screen="cartelas"></section>
                <section class="page-content importexport"    data-screen="importexport"></section>
                <section class="page-content log"             data-screen="log"></section>
            </main>
        </div>

        <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
        <script src="https://unpkg.com/mathjs@11.7.0/lib/browser/math.js"></script>
        <script type="module" src="script.js"></script>
    </body>
</html>
